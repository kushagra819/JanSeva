services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: janseva
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d janseva"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/janseva
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - JWT_SECRET=${JWT_SECRET:-supersecretkey32byteslongmin1234}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-12345678901234567890123456789012}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@janseva.gov}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!@#pass}
      - AI_PROVIDER=${AI_PROVIDER:-http}
      - AI_CLASSIFIER_URL=http://ai:8000/analyze
      - AI_AUTO_ROUTE_THRESHOLD=0.85
      - AI_REVIEW_THRESHOLD=0.55
      - UPLOAD_DIRECTORY=/data/uploads
      - MAX_UPLOAD_MB=10
      - CORS_ALLOWED_ORIGINS=*
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evidence-volume:/data/uploads

  ai:
    profiles: ["ai"]
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - STT_MODEL_SIZE=${STT_MODEL_SIZE:-small}
      - STT_DEVICE=${STT_DEVICE:-cpu}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - STT_MODEL_CACHE=/models
      - STT_MAX_AUDIO_MB=15
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
    volumes:
      - stt-models:/models

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  evidence-volume:
  stt-models:
